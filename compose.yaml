services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: devops-pet-project-app
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: devops-pet-project-redis
    ports:
      - "6379:6379"